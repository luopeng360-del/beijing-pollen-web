  <!-- 左中叶脉 -->
  <path d="M 85 135 Q 70 160 72 185" 
        stroke="#2d5a2d" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- 右上叶子 -->
  <path d="M 160 75 Q 185 80 195 100 Q 200 125 180 140 Q 165 140 155 120 Q 150 95 160 80 Z" 
