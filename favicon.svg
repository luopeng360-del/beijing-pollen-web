  <!-- 中心叶子（主体）-->
  <path d="M 128 100 Q 108 110 105 140 Q 105 175 128 195 Q 150 175 150 140 Q 148 110 128 100 Z" 
        fill="#9ccc65" stroke="#2d5a2d" stroke-width="2" stroke-linejoin="round"/>
  <!-- 中心叶脉 -->
  <path d="M 128 105 Q 125 140 126 170 Q 127 190 128 195" 
        stroke="#2d5a2d" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 115 120 Q 128 140 140 120" 
