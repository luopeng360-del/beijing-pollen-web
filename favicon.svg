  <!-- 左上叶脉 -->
  <path d="M 90 85 Q 80 105 82 125" 
        stroke="#2d5a2d" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- 左中叶子 -->
  <path d="M 85 125 Q 60 135 55 160 Q 50 185 70 200 Q 85 205 98 190 Q 105 165 100 140 Z" 
